name: biomove
description: BioMove — Análisis biomecánico con IA personal
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  google_sign_in: ^6.2.1
  firebase_messaging: ^15.1.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  provider: ^6.1.2
  go_router: ^14.3.0
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  camera: ^0.10.5+9
  image_picker: ^1.1.2
  video_player: ^2.9.2
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_animate: ^4.5.0
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.2.0+3
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  flutter_local_notifications: ^17.2.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  gal: ^2.3.0
  intl: ^0.19.0
  uuid: ^4.5.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
